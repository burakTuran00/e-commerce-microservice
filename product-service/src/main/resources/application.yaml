server:
  port: 8087

spring:
  datasource:
    url: jdbc:postgresql://localhost:5434/product_db
    username: user
    password: pass
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: create   # dev ortam? iÓin
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect

  application:
    name: product-service